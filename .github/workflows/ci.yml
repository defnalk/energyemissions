name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: energy
          POSTGRES_PASSWORD: energy
          POSTGRES_DB: energy
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      POSTGRES_USER: energy
      POSTGRES_PASSWORD: energy
      POSTGRES_DB: energy
      DBT_PROFILES_DIR: ${{ github.workspace }}/dbt_project

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Type check
        run: mypy --strict ingest transform orchestration

      - name: Apply migrations
        run: |
          for f in warehouse/migrations/*.sql; do
            PGPASSWORD=energy psql -h localhost -U energy -d energy -f "$f"
          done

      - name: Pytest
        run: pytest --cov

      - name: dbt build
        run: |
          cd dbt_project
          dbt deps
          dbt build --target test
